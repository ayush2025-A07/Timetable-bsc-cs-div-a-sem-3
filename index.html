<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timetable Pro</title>
    <link rel="stylesheet" href="style.css">
    
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-placeholder.png">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Timetable Pro","short_name":"Timetable","display":"standalone","background_color":"#ffffff","theme_color":"#3498db"}'>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <h1 id="app-title">Today</h1>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
            <div class="live-clock">
                <span id="current-time">00:00</span>
                <span id="current-date">Monday, Jan 1</span>
            </div>
        </header>

        <main id="main-content" class="fade-in">
            </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-target="home">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item" data-target="schedule">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span>Schedule</span>
            </a>
            <a href="#" class="nav-item" data-target="subjects">
                <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span>Subjects</span>
            </a>
            <a href="#" class="nav-item" data-target="faculty">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Faculty</span>
            </a>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
